Name: VPN MASTER panel
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Выберите действие'
        required: true
        default: 'off'
        type: choice
        options:
        - 'off'
        - 'on'

permissions:
  contents: write

jobs:
  switch_vpn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update VPN Files
        run: |
          # Список файлов, которые нужно обрабатывать (через пробел)
          FILES="vpn.txtMASTER links.txt"
          
          if [ "${{ github.event.inputs.action }}" == "off" ]; then
            echo "Выключаем VPN в файлах..."
            for file in $FILES; do
              if [ -f "$file" ]; then
                sed -i 's/vless/OFF_vless/g' "$file"
                echo "Файл $file успешно отключен"
              else
                echo "Предупреждение: файл $file не найден"
              fi
            done
          else
            echo "Включаем VPN в файлах..."
            for file in $FILES; do
              if [ -f "$file" ]; then
                sed -i 's/OFF_vless/vless/g' "$file"
                echo "Файл $file успешно включен"
              else
                echo "Предупреждение: файл $file не найден"
              fi
            done
          fi
          
      - name: Save changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Добавляем оба файла (или вообще все txt файлы, если их станет больше)
          git add vpn.txtMASTER links.txt
          
          # Проверяем, есть ли изменения, прежде чем пушить
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "VPN Control: ${{ github.event.inputs.action }}"
            git push
          fi
          
