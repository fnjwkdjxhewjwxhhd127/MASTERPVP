name: MASTERPVP CONTROL
on:
  workflow_dispatch: # Запуск вручную по кнопке, чтобы другие боты ничего не ломали

permissions:
  contents: write

jobs:
  switch_vpn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Process VPN Files
        run: |
          python - <<EOF
          import os
          import base64

          links_file = "links.txt"

          # Строго файлы с 1 по 9
          target_files = [
              "vpn.txtMASTER1",
              "vpn.txtMASTER2",
              "vpn.txtMASTER3",
              "vpn.txtMASTER4",
              "vpn.txtMASTER5",
              "vpn.txtMASTER6",
              "vpn.txtMASTER7",
              "vpn.txtMASTER8",
              "vpn.txtMASTER9"
          ]

          if not os.path.exists(links_file):
              with open(links_file, "w", encoding="utf-8") as f:
                  f.write("")
              content = ""
          else:
              with open(links_file, "r", encoding="utf-8") as f:
                  content = f.read().strip()
              
          if not content or content.lower() == "off":
              print("Режим OFF: Блокируем 9 файлов...")
              off_text = "OFF_vpn".encode("utf-8")
              off_base64 = base64.b64encode(off_text).decode("utf-8")
              
              for file_name in target_files:
                  with open(file_name, "w+", encoding="utf-8") as f:
                      f.write(off_base64)
                  print(f"Файл {file_name} успешно отключен.")
          else:
              print("Режим ON: Шифруем ссылки для 9 файлов...")
              encoded_bytes = base64.b64encode(content.encode("utf-8"))
              base64_string = encoded_bytes.decode("utf-8")
              
              for file_name in target_files:
                  with open(file_name, "w+", encoding="utf-8") as f:
                      f.write(base64_string)
                  print(f"Файл {file_name} успешно обновлен и зашифрован.")
          EOF

      - name: Save changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Явно добавляем файлы с цифрами, чтобы обойти любые другие скрипты
          git add vpn.txtMASTER1 vpn.txtMASTER2 vpn.txtMASTER3 vpn.txtMASTER4 vpn.txtMASTER5 vpn.txtMASTER6 vpn.txtMASTER7 vpn.txtMASTER8 vpn.txtMASTER9
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Manual update VPN: 9 files forced update"
            git push origin main
          fi
          
          
